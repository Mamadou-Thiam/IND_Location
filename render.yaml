services:
  - type: web
    name: ind-location-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://ind-location.onrender.com

  - type: static
    name: ind-location-frontend
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build:prod && cp -r dist ../dist
    staticPublishPath: dist
    headers:
      - path: /**
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        value: https://ind-location-api.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ind-location-api.onrender.com/api/:splat
